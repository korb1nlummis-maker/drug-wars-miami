<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Drug Wars: Miami Vice Edition</title>
<style>
/* ============================================================
   DRUG WARS: MIAMI VICE EDITION - 70s Retro Neon Theme
   ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Press+Start+2P&display=swap');

/* --- RESET & BASE --- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-dark: #0a0a1a;
  --bg-panel: #111128;
  --bg-card: #1a1a3e;
  --bg-card-hover: #252560;
  --neon-pink: #ff2d95;
  --neon-pink-glow: #ff2d9588;
  --neon-cyan: #00f0ff;
  --neon-cyan-glow: #00f0ff66;
  --neon-green: #39ff14;
  --neon-green-glow: #39ff1466;
  --neon-yellow: #ffe600;
  --neon-yellow-glow: #ffe60066;
  --neon-red: #ff3333;
  --neon-red-glow: #ff333366;
  --neon-purple: #bf5fff;
  --neon-orange: #ff6b35;
  --text-main: #e0d6ff;
  --text-dim: #8888aa;
  --text-mid: #aaaabb;
  --border-color: #333366;
  --font-display: 'Orbitron', sans-serif;
  --font-body: 'Rajdhani', sans-serif;
  --font-pixel: 'Press Start 2P', monospace;
}

html { font-size: 15px; }

body {
  font-family: var(--font-body);
  background: var(--bg-dark);
  color: var(--text-main);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.5;
}

/* Animated scanline overlay */
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 0, 0, 0.08) 2px,
    rgba(0, 0, 0, 0.08) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* Animated gradient background */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(255, 45, 149, 0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(0, 240, 255, 0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(191, 95, 255, 0.05) 0%, transparent 50%);
  pointer-events: none;
  z-index: -1;
  animation: bgPulse 8s ease-in-out infinite alternate;
}

@keyframes bgPulse {
  0% { opacity: 0.7; }
  100% { opacity: 1; }
}

/* --- SCROLLBAR --- */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg-dark); }
::-webkit-scrollbar-thumb { background: var(--neon-pink); border-radius: 4px; }

/* --- NEON TEXT CLASSES --- */
.neon-pink { color: var(--neon-pink); text-shadow: 0 0 10px var(--neon-pink-glow); }
.neon-cyan { color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan-glow); }
.neon-green { color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green-glow); }
.neon-yellow { color: var(--neon-yellow); text-shadow: 0 0 10px var(--neon-yellow-glow); }
.neon-red { color: var(--neon-red); text-shadow: 0 0 10px var(--neon-red-glow); }

/* --- BUTTONS --- */
.btn {
  font-family: var(--font-display);
  font-size: 0.8rem;
  font-weight: 700;
  padding: 0.5rem 1.2rem;
  border: 2px solid var(--border-color);
  border-radius: 4px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: all 0.2s;
  background: var(--bg-card);
  color: var(--text-main);
  outline: none;
}

.btn:hover { transform: translateY(-1px); filter: brightness(1.3); }
.btn:active { transform: translateY(0); }

.btn-primary {
  background: linear-gradient(135deg, #ff2d95, #bf5fff);
  border-color: var(--neon-pink);
  color: #fff;
  font-size: 1rem;
  padding: 0.7rem 2rem;
}

.btn-glow {
  box-shadow: 0 0 20px var(--neon-pink-glow), 0 0 40px rgba(255, 45, 149, 0.2);
  animation: glowPulse 2s ease-in-out infinite;
}

@keyframes glowPulse {
  0%, 100% { box-shadow: 0 0 20px var(--neon-pink-glow), 0 0 40px rgba(255, 45, 149, 0.2); }
  50% { box-shadow: 0 0 30px var(--neon-pink-glow), 0 0 60px rgba(255, 45, 149, 0.3); }
}
.btn-locked { opacity: 0.4; pointer-events: none; filter: grayscale(80%); position: relative; }
.btn-locked-interactive { opacity: 0.45; filter: grayscale(70%); cursor: not-allowed !important; position: relative; }
.btn-locked-interactive:hover { opacity: 0.55; filter: grayscale(60%); }
.btn-locked-interactive .lock-icon { margin-right: 0.3rem; }
.btn-sidebar.btn-locked-interactive { border-color: #444 !important; color: #666 !important; text-shadow: none !important; }
.btn-sidebar.btn-locked-interactive:hover::after { content: attr(data-lock-tooltip); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #1a1a2e; border: 1px solid var(--neon-cyan); color: var(--neon-cyan); padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.6rem; white-space: nowrap; z-index: 100; pointer-events: none; box-shadow: 0 0 8px rgba(0,255,255,0.2); }
.main-tab-btn.tab-locked { opacity: 0.35; filter: grayscale(80%); cursor: not-allowed !important; color: #555 !important; border-bottom-color: transparent !important; text-shadow: none !important; }
.main-tab-btn.tab-locked:hover { color: #666 !important; }
.main-tab-btn.tab-locked:hover::after { content: attr(data-lock-tooltip); position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #1a1a2e; border: 1px solid var(--neon-cyan); color: var(--neon-cyan); padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.6rem; white-space: nowrap; z-index: 100; }
.main-tab-btn { position: relative; }
.unlock-toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px); background: linear-gradient(135deg, #0a2a1a, #1a3a2a); border: 2px solid var(--neon-green); color: var(--neon-green); padding: 0.8rem 1.5rem; border-radius: 8px; font-family: var(--font-body); font-size: 0.85rem; font-weight: bold; z-index: 2000; opacity: 0; transition: all 0.4s ease; text-align: center; box-shadow: 0 0 20px rgba(0,255,100,0.3), 0 4px 20px rgba(0,0,0,0.5); text-shadow: 0 0 8px rgba(0,255,100,0.4); }
.unlock-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.unlock-toast .unlock-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.15em; color: #88ffaa; margin-bottom: 0.3rem; }
.unlock-toast .unlock-name { font-size: 1rem; color: #00ff88; }
.unlock-toast .unlock-desc { font-size: 0.7rem; color: #aaa; margin-top: 0.2rem; font-weight: normal; }
.ng-plus-badge { display: inline-block; background: linear-gradient(135deg, #ff2d95, #ff9500); color: #000; font-weight: bold; font-size: 0.65rem; padding: 0.15rem 0.5rem; border-radius: 3px; margin-left: 0.5rem; letter-spacing: 0.1rem; animation: ngPlusPulse 3s ease-in-out infinite; }
@keyframes ngPlusPulse { 0%, 100% { box-shadow: 0 0 8px rgba(255,45,149,0.4); } 50% { box-shadow: 0 0 16px rgba(255,45,149,0.8); } }
.game-input { background: var(--bg-dark); border: 1px solid var(--border-color); color: var(--text-primary); padding: 0.4rem 0.6rem; border-radius: 4px; font-family: inherit; font-size: 0.85rem; }
.game-input:focus { border-color: var(--neon-cyan); outline: none; }
.game-input option { background: var(--bg-dark); color: var(--text-primary); }

.btn-secondary { background: var(--bg-card); border-color: var(--neon-cyan); color: var(--neon-cyan); }
.btn-danger { background: #2a0a0a; border-color: var(--neon-red); color: var(--neon-red); }
.btn-buy { background: #0a2a0a; border-color: var(--neon-green); color: var(--neon-green); }
.btn-sell { background: #2a2a0a; border-color: var(--neon-yellow); color: var(--neon-yellow); }
.btn-sm { font-size: 0.65rem; padding: 0.3rem 0.6rem; }
.btn-max { background: var(--bg-card-hover); border-color: var(--neon-purple); color: var(--neon-purple); }

/* --- LAYOUT --- */
#app { max-width: 900px; margin: 0 auto; padding: 1rem; min-height: 100vh; }
#modal-container { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 1000; pointer-events: none; }
#modal-container:not(:empty) { pointer-events: all; }

.screen-container { padding: 1rem 0; }

/* --- TITLE SCREEN --- */
.title-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  text-align: center;
}

.title-neon-border {
  border: 2px solid var(--neon-pink);
  border-radius: 8px;
  padding: 2rem 3rem;
  background: var(--bg-panel);
  box-shadow: 0 0 30px var(--neon-pink-glow), inset 0 0 30px rgba(255, 45, 149, 0.05);
  max-width: 600px;
  width: 100%;
}

.title-palm { font-size: 3rem; margin-bottom: 0.5rem; }

.title-main {
  font-family: var(--font-display);
  font-size: 3.5rem;
  font-weight: 900;
  color: var(--neon-pink);
  text-shadow: 0 0 20px var(--neon-pink-glow), 0 0 40px rgba(255, 45, 149, 0.3), 0 0 80px rgba(255, 45, 149, 0.1);
  letter-spacing: 6px;
  margin-bottom: 0.3rem;
  animation: titleFlicker 4s ease-in-out infinite;
}

@keyframes titleFlicker {
  0%, 95%, 100% { opacity: 1; }
  96% { opacity: 0.8; }
  97% { opacity: 1; }
  98% { opacity: 0.7; }
  99% { opacity: 1; }
}

.title-sub {
  font-family: var(--font-display);
  font-size: 1rem;
  font-weight: 400;
  color: var(--neon-cyan);
  text-shadow: 0 0 15px var(--neon-cyan-glow);
  letter-spacing: 4px;
  margin-bottom: 1rem;
}

.title-divider {
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--neon-pink), var(--neon-cyan), transparent);
  margin: 1rem 0;
}

.title-tagline {
  font-size: 1.1rem;
  color: var(--text-dim);
  margin-bottom: 0.5rem;
  line-height: 1.6;
}

.title-year { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 1.5rem; }

.title-screen .btn { display: block; width: 100%; margin-bottom: 0.7rem; }

.title-instructions {
  margin-top: 1.5rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border-color);
  text-align: left;
}
.title-instructions h3 {
  font-family: var(--font-display);
  font-size: 0.85rem;
  color: var(--neon-yellow);
  margin-bottom: 0.5rem;
}
.title-instructions p { font-size: 0.9rem; color: var(--text-dim); }

/* --- STATUS BAR --- */
.status-bar {
  background: var(--bg-panel);
  border: 1px solid var(--border-color);
  border-radius: 6px;
  padding: 0.6rem 1rem;
  margin-bottom: 1rem;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(10px);
}

.status-row {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem 1.5rem;
  align-items: center;
  padding: 0.2rem 0;
}

.stat { display: flex; gap: 0.4rem; align-items: center; padding: 0.2rem 0.4rem; }
.stat-label { font-family: var(--font-display); font-size: 0.7rem; color: var(--text-dim); letter-spacing: 1px; }
.stat-value { font-family: var(--font-display); font-size: 0.95rem; font-weight: 700; }

.heat-bar {
  width: 80px; height: 10px;
  background: var(--bg-dark);
  border: 1px solid var(--border-color);
  border-radius: 5px;
  overflow: hidden;
}
.heat-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--neon-yellow), var(--neon-red));
  transition: width 0.5s;
}

/* --- LOCATION HEADER --- */
.location-header {
  background: var(--bg-panel);
  border: 1px solid var(--neon-pink);
  border-radius: 6px;
  padding: 1rem 1.2rem;
  margin-bottom: 1rem;
  box-shadow: 0 0 15px rgba(255, 45, 149, 0.1);
}

.location-name {
  font-family: var(--font-display);
  font-size: 1.8rem;
  font-weight: 900;
  display: inline;
  margin-right: 0.8rem;
}

.location-region {
  font-family: var(--font-display);
  font-size: 0.7rem;
  color: var(--text-dim);
  background: var(--bg-card);
  padding: 0.2rem 0.6rem;
  border-radius: 3px;
  vertical-align: super;
}

.location-desc { font-size: 1rem; color: var(--neon-cyan); margin: 0.3rem 0; }
.location-flavor { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 0.5rem; }

.location-badges { display: flex; flex-wrap: wrap; gap: 0.3rem; }
.badge {
  font-family: var(--font-display);
  font-size: 0.6rem;
  padding: 0.15rem 0.5rem;
  border-radius: 3px;
  background: var(--bg-card);
  border: 1px solid;
  letter-spacing: 0.5px;
}
.badge-green { border-color: var(--neon-green); color: var(--neon-green); }
.badge-red { border-color: var(--neon-red); color: var(--neon-red); }
.badge-cyan { border-color: var(--neon-cyan); color: var(--neon-cyan); }
.badge-yellow { border-color: var(--neon-yellow); color: var(--neon-yellow); }
.badge-danger { border-color: var(--neon-orange); color: var(--neon-orange); }

/* --- PRICE EVENTS --- */
.price-events { margin-bottom: 1rem; }
.event-alert {
  background: linear-gradient(135deg, rgba(255, 45, 149, 0.15), rgba(191, 95, 255, 0.1));
  border: 1px solid var(--neon-pink);
  border-radius: 4px;
  padding: 0.5rem 0.8rem;
  margin-bottom: 0.3rem;
  font-size: 0.9rem;
  animation: eventFlash 0.5s ease-out;
}
.event-clickable {
  cursor: pointer;
  transition: all 0.2s ease;
}
.event-clickable:hover {
  background: linear-gradient(135deg, rgba(255, 45, 149, 0.3), rgba(191, 95, 255, 0.2));
  border-color: #ff88cc;
  transform: translateY(-1px);
  box-shadow: 0 2px 8px rgba(255, 45, 149, 0.3);
}

@keyframes eventFlash {
  0% { background: rgba(255, 45, 149, 0.4); }
  100% { background: rgba(255, 45, 149, 0.15); }
}

/* --- MESSAGE LOG --- */
.message-log {
  background: var(--bg-panel);
  border-left: 3px solid var(--neon-cyan);
  padding: 0.5rem 0.8rem;
  margin-bottom: 1rem;
  border-radius: 0 4px 4px 0;
}
.log-msg { font-size: 0.85rem; padding: 0.15rem 0; color: var(--neon-cyan); }

/* --- DATA TABLES --- */
.data-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 1rem;
}

.data-table th {
  font-family: var(--font-display);
  font-size: 0.65rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 0.4rem 0.6rem;
  border-bottom: 2px solid var(--border-color);
  text-align: left;
}

.data-table td {
  padding: 0.5rem 0.7rem;
  border-bottom: 1px solid rgba(51, 51, 102, 0.4);
  font-size: 0.95rem;
  line-height: 1.4;
}

.data-table tr:hover { background: rgba(255, 45, 149, 0.05); }

.data-table .row-spike { background: rgba(255, 45, 149, 0.12) !important; }
.data-table .row-crash { background: rgba(57, 255, 20, 0.08) !important; }
.data-table .row-owned { background: rgba(0, 240, 255, 0.05); }

.price-cell { font-family: var(--font-display); font-weight: 700; color: var(--neon-green); }
.owned-cell { font-family: var(--font-display); color: var(--neon-cyan); }
.action-cell { display: flex; gap: 0.3rem; }
.unavailable { color: var(--text-dim); }

/* --- MARKET SECTION --- */
.market-section, .inventory-section {
  background: var(--bg-panel);
  border: 1px solid var(--border-color);
  border-radius: 6px;
  padding: 1rem;
  margin-bottom: 1rem;
}

.section-title {
  font-family: var(--font-display);
  font-size: 0.9rem;
  letter-spacing: 2px;
  margin-bottom: 0.8rem;
}

/* --- INVENTORY --- */
.inv-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 0.3rem;
  margin-bottom: 0.5rem;
}

.inv-item {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 4px;
  padding: 0.2rem 0.6rem;
  font-size: 0.8rem;
}

.inv-empty { color: var(--text-dim); font-style: italic; }
.inv-sub { font-size: 0.8rem; color: var(--text-dim); }

/* --- ACTION BUTTONS --- */
/* --- GAME LAYOUT: SIDEBAR + MAIN --- */
.game-layout {
  display: flex;
  gap: 1rem;
  align-items: flex-start;
}
.game-sidebar {
  width: 160px;
  min-width: 160px;
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
  position: sticky;
  top: 80px;
  max-height: calc(100vh - 100px);
  overflow-y: auto;
  padding-right: 0.5rem;
}
.game-sidebar::-webkit-scrollbar { width: 3px; }
.game-sidebar::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 2px; }
.sidebar-section {
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
  padding-bottom: 0.4rem;
  border-bottom: 1px solid var(--border-color);
}
.sidebar-section:last-child { border-bottom: none; }
.sidebar-label {
  font-family: var(--font-display);
  font-size: 0.7rem;
  color: var(--neon-cyan);
  letter-spacing: 0.18em;
  padding: 0.35rem 0.4rem 0.2rem;
  margin: 0.1rem -0.3rem 0.1rem;
  border-left: 2px solid var(--neon-cyan);
  text-shadow: 0 0 8px rgba(0, 255, 255, 0.3);
  background: linear-gradient(90deg, rgba(0,255,255,0.06) 0%, transparent 100%);
}
.sidebar-bottom { margin-top: auto; }
.btn-sidebar {
  width: 100%;
  text-align: left;
  padding: 0.45rem 0.6rem;
  font-size: 0.8rem;
  white-space: nowrap;
}
.game-main {
  flex: 1;
  min-width: 0;
}

/* Main content tab bar */
.main-tab-bar { display: flex; gap: 0; margin-bottom: 0.5rem; border-bottom: 2px solid var(--border-color); }
.main-tab-btn {
  padding: 0.5rem 1.2rem;
  background: transparent;
  color: var(--text-dim);
  border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  cursor: pointer;
  font-family: var(--font-body);
  font-size: 0.85rem;
  font-weight: 600;
  transition: all 0.2s;
}
.main-tab-btn:hover { color: var(--neon-cyan); }
.main-tab-btn.active {
  color: var(--neon-cyan);
  border-bottom-color: var(--neon-cyan);
  text-shadow: 0 0 8px var(--neon-cyan-glow);
}

/* Legacy bottom buttons - hidden when sidebar is used */
.action-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-top: 1rem;
  padding-top: 1rem;
  border-top: 2px solid var(--border-color);
}

/* --- TRADE MODAL --- */
.trade-modal {
  background: var(--bg-panel);
  border: 2px solid var(--neon-green);
  border-radius: 8px;
  padding: 1rem 1.2rem;
  margin-bottom: 1rem;
  box-shadow: 0 0 30px var(--neon-green-glow);
}

.trade-content h3 {
  font-family: var(--font-display);
  font-size: 1.1rem;
  margin-bottom: 0.5rem;
}

.trade-controls {
  display: flex;
  align-items: center;
  gap: 0.3rem;
  margin: 0.8rem 0;
  flex-wrap: wrap;
}

.trade-input {
  font-family: var(--font-display);
  font-size: 1.2rem;
  width: 100px;
  text-align: center;
  background: var(--bg-dark);
  border: 2px solid var(--neon-cyan);
  border-radius: 4px;
  color: var(--neon-cyan);
  padding: 0.3rem;
  outline: none;
}

.trade-input:focus { box-shadow: 0 0 10px var(--neon-cyan-glow); }

.trade-total {
  font-family: var(--font-display);
  font-size: 1.2rem;
  margin: 0.5rem 0;
}

.trade-actions { display: flex; gap: 0.5rem; }

/* --- MODAL OVERLAY --- */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0, 0, 0, 0.8);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1001;
}

.modal {
  background: var(--bg-panel);
  border: 2px solid var(--neon-cyan);
  border-radius: 8px;
  padding: 1.5rem 2rem;
  max-width: 450px;
  width: 90%;
  box-shadow: 0 0 40px var(--neon-cyan-glow);
}

.modal h3 { font-family: var(--font-display); font-size: 1.1rem; margin-bottom: 0.8rem; }
.modal p { margin-bottom: 0.4rem; }
.modal .small { font-size: 0.8rem; color: var(--text-dim); }
.modal-row { display: flex; gap: 0.5rem; align-items: center; margin: 0.8rem 0; flex-wrap: wrap; }
.modal-actions { display: flex; gap: 0.5rem; margin-top: 1rem; }

/* --- TRAVEL SCREEN --- */
.region-header {
  font-family: var(--font-display);
  font-size: 0.85rem;
  letter-spacing: 2px;
  margin: 1rem 0 0.5rem;
  padding-bottom: 0.3rem;
  border-bottom: 1px solid var(--border-color);
  color: var(--text-dim);
}

.travel-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 0.5rem;
  margin-bottom: 0.5rem;
}

.travel-card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 6px;
  padding: 0.6rem 0.8rem;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}

.travel-card:hover {
  border-color: var(--neon-pink);
  background: var(--bg-card-hover);
  box-shadow: 0 0 10px var(--neon-pink-glow);
}

.travel-card.visited { border-color: rgba(0, 240, 255, 0.3); }

.travel-card-name {
  font-family: var(--font-display);
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--neon-pink);
  margin-bottom: 0.2rem;
}

.travel-card-desc { font-size: 0.75rem; color: var(--text-dim); }
.travel-card-danger { font-size: 0.7rem; color: var(--neon-orange); margin-top: 0.2rem; }
.travel-card-specialty { font-size: 0.7rem; color: var(--neon-green); }

/* World Map */
.world-map-container { position: relative; width: 100%; max-width: 900px; aspect-ratio: 2/1; background: #0a0a15; border: 1px solid var(--border-color); border-radius: 8px; margin: 1rem auto; overflow: hidden; }
.world-map-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
.map-city-node { position: absolute; width: 12px; height: 12px; border-radius: 50%; cursor: pointer; transform: translate(-50%, -50%); transition: all 0.2s; z-index: 2; border: 2px solid #555; background: #333; }
.map-city-node:hover { transform: translate(-50%, -50%) scale(1.6); z-index: 10; }
.map-city-node.current { background: var(--neon-pink); border-color: var(--neon-pink); box-shadow: 0 0 12px var(--neon-pink), 0 0 24px rgba(255,45,149,0.4); animation: mapPulse 2s infinite; }
.map-city-node.territory { background: var(--neon-purple); border-color: var(--neon-purple); box-shadow: 0 0 8px rgba(157,78,221,0.5); }
.map-city-node.visited { background: var(--neon-cyan); border-color: var(--neon-cyan); opacity: 0.8; }
.map-city-node.unvisited { background: #444; border-color: #666; opacity: 0.5; }
.map-city-node.heat-high { box-shadow: 0 0 10px rgba(255,140,0,0.7), 0 0 20px rgba(255,140,0,0.3); }
.map-city-label { position: absolute; font-size: 0.6rem; font-family: var(--font-display); color: var(--text-dim); white-space: nowrap; transform: translateX(-50%); pointer-events: none; z-index: 1; text-shadow: 0 0 4px #000, 0 0 8px #000; }
.map-region-label { position: absolute; font-size: 0.55rem; font-family: var(--font-display); color: rgba(136,136,170,0.3); text-transform: uppercase; letter-spacing: 0.2em; pointer-events: none; z-index: 0; }
.map-view-toggle { display: flex; gap: 0.5rem; margin: 0.5rem 0; }
.map-view-toggle button { font-size: 0.8rem; padding: 0.3rem 0.8rem; }
@keyframes mapPulse { 0%, 100% { box-shadow: 0 0 12px var(--neon-pink), 0 0 24px rgba(255,45,149,0.4); } 50% { box-shadow: 0 0 20px var(--neon-pink), 0 0 40px rgba(255,45,149,0.6); } }
.map-tooltip { position: absolute; background: var(--bg-card); border: 1px solid var(--neon-pink); border-radius: 6px; padding: 0.5rem 0.8rem; font-size: 0.75rem; z-index: 20; pointer-events: none; white-space: nowrap; transform: translate(-50%, -120%); display: none; }
.map-city-node:hover + .map-tooltip, .map-tooltip:hover { display: block; }

/* World Map Multi-Level */
.world-map-header { display: flex; align-items: center; justify-content: space-between; padding: 0.8rem 1rem; border-bottom: 1px solid rgba(0,240,255,0.15); }
.world-map-svg-wrap { position: relative; width: 100%; aspect-ratio: 2/1; }
.world-map-svg-wrap .world-map-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
.world-node { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
.world-node:hover { transform: scale(1.3); }
.world-node-emoji { font-size: 18px; }
.world-node-current { background: rgba(0,240,255,0.2); border: 2px solid #00f0ff; box-shadow: 0 0 12px #00f0ff, 0 0 24px rgba(0,240,255,0.3); animation: mapPulse2 2s infinite; }
.world-node-unlocked { background: rgba(0,255,100,0.15); border: 2px solid #00ff66; }
.world-node-locked { background: rgba(50,50,50,0.5); border: 2px solid #333; opacity: 0.5; cursor: not-allowed; }
.world-node-available { background: rgba(255,0,170,0.2); border: 2px solid #ff00aa; opacity: 1; cursor: pointer; animation: mapPulse3 2s infinite; }
@keyframes mapPulse2 { 0%,100% { box-shadow: 0 0 12px #00f0ff; } 50% { box-shadow: 0 0 24px #00f0ff, 0 0 40px rgba(0,240,255,0.4); } }
@keyframes mapPulse3 { 0%,100% { box-shadow: 0 0 8px #ff00aa; } 50% { box-shadow: 0 0 16px #ff00aa, 0 0 30px rgba(255,0,170,0.4); } }
.world-map-legend { display: flex; gap: 1rem; padding: 0.5rem 1rem; justify-content: center; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 0.3rem; font-size: 0.7rem; color: #888; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.btn-back-world { background: rgba(0,240,255,0.1); border: 1px solid rgba(0,240,255,0.3); color: #00f0ff; padding: 0.3rem 0.8rem; border-radius: 4px; font-family: var(--font-display); font-size: 0.75rem; cursor: pointer; }
.btn-back-world:hover { background: rgba(0,240,255,0.2); }
.world-event-banner { background: rgba(255,100,0,0.15); border: 1px solid rgba(255,100,0,0.3); color: #ffaa00; padding: 0.4rem 1rem; font-size: 0.8rem; text-align: center; }

.visited-badge {
  position: absolute;
  top: 0.3rem;
  right: 0.3rem;
  font-size: 0.6rem;
  color: var(--neon-cyan);
  background: var(--bg-dark);
  padding: 0.1rem 0.3rem;
  border-radius: 3px;
}

/* --- TRANSPORT PANEL --- */
.transport-panel {
  background: var(--bg-panel);
  border: 2px solid var(--neon-yellow);
  border-radius: 8px;
  padding: 1rem;
  margin-bottom: 1rem;
  box-shadow: 0 0 20px var(--neon-yellow-glow);
}

.transport-panel h3 { font-family: var(--font-display); font-size: 1rem; margin-bottom: 0.8rem; }

.transport-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 0.5rem;
}

.transport-card {
  background: var(--bg-card);
  border: 1px solid var(--neon-cyan);
  border-radius: 6px;
  padding: 0.6rem 0.8rem;
  cursor: pointer;
  transition: all 0.2s;
}

.transport-card:hover:not(.disabled) {
  background: var(--bg-card-hover);
  box-shadow: 0 0 10px var(--neon-cyan-glow);
}

.transport-card.disabled {
  opacity: 0.4;
  cursor: not-allowed;
  border-color: var(--border-color);
}

.transport-name { font-family: var(--font-display); font-size: 0.8rem; font-weight: 700; color: var(--neon-cyan); }
.transport-cost { font-family: var(--font-display); font-size: 1rem; color: var(--neon-green); margin: 0.2rem 0; }
.transport-time, .transport-risk, .transport-carry { font-size: 0.7rem; color: var(--text-dim); }

/* --- COMBAT SCREEN --- */
.combat-screen { display: flex; align-items: center; justify-content: center; min-height: 80vh; }

.combat-box {
  background: var(--bg-panel);
  border: 2px solid var(--neon-red);
  border-radius: 8px;
  padding: 1.5rem 2rem;
  max-width: 600px;
  width: 100%;
  box-shadow: 0 0 40px var(--neon-red-glow);
  text-align: center;
}

.combat-box h2 {
  font-family: var(--font-display);
  font-size: 1.5rem;
  margin-bottom: 0.5rem;
  animation: combatPulse 1s ease-in-out infinite;
}

@keyframes combatPulse {
  0%, 100% { text-shadow: 0 0 10px var(--neon-red-glow); }
  50% { text-shadow: 0 0 30px var(--neon-red-glow), 0 0 50px rgba(255, 51, 51, 0.3); }
}

.combat-stats {
  display: flex;
  align-items: center;
  justify-content: space-around;
  margin: 1rem 0;
  gap: 1rem;
}

.combatant {
  flex: 1;
  background: var(--bg-card);
  border-radius: 6px;
  padding: 0.8rem;
}

.combatant h3 { font-family: var(--font-display); font-size: 0.9rem; margin-bottom: 0.4rem; }
.combatant p { font-size: 0.8rem; }
.vs { font-family: var(--font-display); font-size: 1.2rem; color: var(--neon-yellow); }

.health-bar {
  width: 100%;
  height: 14px;
  background: var(--bg-dark);
  border: 1px solid var(--neon-green);
  border-radius: 7px;
  overflow: hidden;
  margin-bottom: 0.3rem;
}

.health-bar.enemy { border-color: var(--neon-red); }
.health-fill { height: 100%; background: linear-gradient(90deg, var(--neon-green), #7fff00); transition: width 0.3s; border-radius: 7px; }
.enemy-fill { background: linear-gradient(90deg, var(--neon-red), var(--neon-orange)); }

.combat-log {
  background: var(--bg-dark);
  border: 1px solid var(--border-color);
  border-radius: 4px;
  padding: 0.5rem;
  margin: 0.8rem 0;
  max-height: 120px;
  overflow-y: auto;
  text-align: left;
}

.combat-msg { font-size: 0.8rem; padding: 0.2rem 0; border-bottom: 1px solid rgba(51, 51, 102, 0.3); }

.combat-actions { display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; }

/* --- EVENT SCREEN --- */
.event-screen { display: flex; align-items: center; justify-content: center; min-height: 70vh; }

.event-box {
  background: var(--bg-panel);
  border: 2px solid var(--neon-yellow);
  border-radius: 8px;
  padding: 2rem;
  max-width: 500px;
  width: 100%;
  text-align: center;
  box-shadow: 0 0 30px var(--neon-yellow-glow);
}

.event-icon { font-size: 3rem; margin-bottom: 0.5rem; }
.event-msg { font-size: 1.1rem; margin-bottom: 1.5rem; line-height: 1.6; }
.event-actions { display: flex; gap: 0.5rem; justify-content: center; }

/* --- GAME OVER --- */
.gameover-screen .title-neon-border {
  border-color: var(--neon-red);
  box-shadow: 0 0 30px var(--neon-red-glow);
}

.score-breakdown {
  text-align: left;
  background: var(--bg-card);
  border-radius: 6px;
  padding: 1rem;
  margin: 1rem 0;
}

.score-breakdown p { margin-bottom: 0.3rem; }

.final-score {
  font-family: var(--font-display);
  font-size: 1.5rem;
  text-align: center;
  margin-top: 0.5rem !important;
}

.rank-title {
  font-family: var(--font-display);
  font-size: 1.2rem;
  text-align: center;
  letter-spacing: 3px;
}

/* --- STASH --- */
.stash-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin: 1rem 0;
}

.stash-grid h3 { font-family: var(--font-display); font-size: 0.85rem; margin-bottom: 0.5rem; color: var(--neon-cyan); }

/* --- RESPONSIVE (see comprehensive mobile section below) --- */

/* --- TOOLBAR --- */
.toolbar {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  background: var(--bg-panel);
  border: 1px solid var(--border-color);
  border-radius: 6px;
  padding: 0.4rem 0.8rem;
  margin-bottom: 0.8rem;
}

.toolbar .btn {
  font-size: 0.6rem;
  padding: 0.3rem 0.7rem;
}

.toolbar-btn {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 4px;
  padding: 0.3rem 0.6rem;
  font-size: 1.1rem;
  cursor: pointer;
  transition: all 0.2s;
  line-height: 1;
}

.toolbar-btn:hover {
  border-color: var(--neon-pink);
  background: var(--bg-card-hover);
  box-shadow: 0 0 8px var(--neon-pink-glow);
}

.toolbar-vol {
  display: flex;
  align-items: center;
  gap: 0.3rem;
}

.toolbar-spacer { flex: 1; }

.vol-slider {
  -webkit-appearance: none;
  appearance: none;
  width: 80px;
  height: 6px;
  background: var(--bg-dark);
  border: 1px solid var(--border-color);
  border-radius: 3px;
  outline: none;
  cursor: pointer;
}

.vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--neon-cyan);
  box-shadow: 0 0 6px var(--neon-cyan-glow);
  cursor: pointer;
}

.vol-slider::-moz-range-thumb {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--neon-cyan);
  box-shadow: 0 0 6px var(--neon-cyan-glow);
  border: none;
  cursor: pointer;
}

.vol-label {
  font-family: var(--font-display);
  font-size: 0.6rem;
  color: var(--text-dim);
  letter-spacing: 1px;
}

/* --- SAVE/LOAD MODAL --- */
.modal-wide {
  max-width: 550px;
}

.save-slots {
  display: flex;
  flex-direction: column;
  gap: 0.8rem;
  margin: 1rem 0;
}

.save-slot {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 6px;
  padding: 0.8rem 1rem;
  transition: all 0.2s;
}

.save-slot:hover {
  border-color: var(--neon-cyan);
  background: var(--bg-card-hover);
}

.save-slot-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.4rem;
}

.save-slot-header span:first-child {
  font-family: var(--font-display);
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--neon-cyan);
}

.save-slot-actions {
  display: flex;
  gap: 0.4rem;
}

.save-slot .text-dim {
  font-size: 0.8rem;
  color: var(--text-dim);
}

/* --- STOCK CHARTS --- */
.chart-container {
  background: var(--bg-panel);
  border: 1px solid var(--border-color);
  border-radius: 6px;
  padding: 1rem;
  margin-bottom: 1rem;
}

.chart-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.8rem;
}

.chart-header h3 {
  font-family: var(--font-display);
  font-size: 0.9rem;
  letter-spacing: 2px;
  color: var(--neon-cyan);
}

.chart-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 0.3rem;
  margin-bottom: 1rem;
}

.chart-tab {
  font-family: var(--font-display);
  font-size: 0.55rem;
  padding: 0.25rem 0.5rem;
  border: 1px solid var(--border-color);
  border-radius: 3px;
  background: var(--bg-card);
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}

.chart-tab:hover {
  border-color: var(--neon-pink);
  color: var(--neon-pink);
}

.chart-tab.active {
  background: linear-gradient(135deg, rgba(255, 45, 149, 0.3), rgba(191, 95, 255, 0.2));
  border-color: var(--neon-pink);
  color: var(--neon-pink);
  text-shadow: 0 0 8px var(--neon-pink-glow);
}

.chart-svg {
  width: 100%;
  height: 200px;
  background: var(--bg-dark);
  border: 1px solid var(--border-color);
  border-radius: 4px;
}

.chart-trend {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-family: var(--font-display);
  font-size: 0.8rem;
}

.chart-trend .up { color: var(--neon-green); }
.chart-trend .down { color: var(--neon-red); }

.chart-stats {
  display: flex;
  gap: 1.5rem;
  margin-top: 0.6rem;
  flex-wrap: wrap;
}

.chart-stats .stat-item {
  font-family: var(--font-display);
  font-size: 0.7rem;
}

.chart-stats .stat-item .label {
  color: var(--text-dim);
  font-size: 0.6rem;
  letter-spacing: 1px;
}

.chart-stats .stat-item .value {
  font-weight: 700;
  font-size: 0.85rem;
}

.chart-footer {
  display: flex;
  justify-content: space-between;
  margin-top: 0.3rem;
}

.chart-tick {
  font-family: var(--font-display);
  font-size: 0.55rem;
  color: var(--text-dim);
}

/* --- SPARKLINES --- */
.sparkline {
  display: inline-block;
  vertical-align: middle;
}

.sparkline svg {
  width: 60px;
  height: 24px;
}

/* --- INVESTIGATION BAR --- */
.investigation-bar {
  width: 80px; height: 10px;
  background: var(--bg-dark);
  border: 1px solid var(--border-color);
  border-radius: 5px;
  overflow: hidden;
  display: inline-block;
  vertical-align: middle;
}
.investigation-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple), var(--neon-red));
  transition: width 0.5s;
}
.investigation-level-0 { color: var(--neon-green); }
.investigation-level-1 { color: var(--neon-yellow); }
.investigation-level-2 { color: var(--neon-orange); }
.investigation-level-3 { color: var(--neon-red); }
.investigation-level-4 { color: var(--neon-red); text-shadow: 0 0 10px var(--neon-red-glow); }
.investigation-level-5 { color: var(--neon-red); animation: combatPulse 1s ease-in-out infinite; }

/* --- COURT SCREEN --- */
.court-screen { display: flex; align-items: center; justify-content: center; min-height: 80vh; }
.court-box {
  background: var(--bg-panel);
  border: 2px solid var(--neon-purple);
  border-radius: 8px;
  padding: 1.5rem 2rem;
  max-width: 650px;
  width: 100%;
  box-shadow: 0 0 40px rgba(191, 95, 255, 0.3);
}
.neon-purple { color: var(--neon-purple); text-shadow: 0 0 10px rgba(191, 95, 255, 0.5); }
.neon-orange { color: var(--neon-orange); text-shadow: 0 0 10px rgba(255, 107, 53, 0.5); }

.court-contacts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 0.5rem;
  margin: 0.8rem 0;
}
.court-contact-card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 6px;
  padding: 0.6rem;
  text-align: center;
  transition: all 0.2s;
  cursor: pointer;
}
.court-contact-card:hover:not(.disabled):not(.used) {
  border-color: var(--neon-purple);
  box-shadow: 0 0 10px rgba(191, 95, 255, 0.3);
}
.court-contact-card.used { border-color: var(--neon-green); background: rgba(57, 255, 20, 0.05); cursor: default; }
.court-contact-card.disabled { opacity: 0.4; cursor: not-allowed; }

.court-chance-bar {
  width: 100%; height: 20px;
  background: var(--bg-dark);
  border: 1px solid var(--neon-purple);
  border-radius: 10px;
  overflow: hidden;
}
.court-chance-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--neon-red), var(--neon-yellow), var(--neon-green));
  transition: width 0.5s;
}
.verdict-guilty { color: var(--neon-red); animation: combatPulse 1s infinite; }
.verdict-not-guilty { color: var(--neon-green); text-shadow: 0 0 20px var(--neon-green-glow); }

/* --- CREW PANEL --- */
.crew-panel {
  background: var(--bg-panel);
  border: 1px solid var(--border-color);
  border-radius: 6px;
  padding: 1rem;
  margin-bottom: 1rem;
}
.crew-card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 6px;
  padding: 0.8rem;
  margin-bottom: 0.5rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.crew-card.injured { border-color: var(--neon-red); background: rgba(255, 51, 51, 0.05); }
.loyalty-bar {
  width: 50px; height: 6px;
  background: var(--bg-dark);
  border: 1px solid var(--border-color);
  border-radius: 3px;
  overflow: hidden;
  display: inline-block;
  vertical-align: middle;
}
.loyalty-fill { height: 100%; transition: width 0.3s; border-radius: 3px; }

/* --- CHART EVENT MARKERS --- */
.chart-event-marker { cursor: pointer; }

/* --- FRONT BUSINESSES --- */
.fronts-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem; margin-top: 0.5rem;
}
.front-card {
  padding: 0.6rem; border-radius: 8px; text-align: center;
  background: var(--bg-card); border: 1px solid var(--border-color);
  transition: all 0.2s; cursor: pointer;
}
.front-card:hover:not(.disabled):not(.owned) { border-color: var(--neon-cyan); }
.front-card.owned { border-color: var(--neon-green); background: rgba(0, 255, 136, 0.05); }
.front-card.disabled { opacity: 0.5; cursor: default; }
.front-name { font-family: var(--font-display); font-size: 0.75rem; font-weight: 700; margin: 0.2rem 0; }
.input-field {
  background: var(--bg-dark); border: 1px solid var(--border-color); color: var(--text-primary);
  padding: 0.4rem 0.6rem; border-radius: 4px; font-family: var(--font-mono); font-size: 0.8rem;
}

/* --- ACHIEVEMENTS --- */
.achievements-grid {
  display: flex; flex-direction: column; gap: 0.4rem;
  max-height: 420px; overflow-y: auto; padding-right: 0.3rem;
}
.achievements-grid::-webkit-scrollbar { width: 6px; }

.property-card .prop-stats { font-size: 0.65rem; color: var(--text-dim); margin: 0.3rem 0; }
.property-card .prop-provides { display: flex; gap: 0.3rem; flex-wrap: wrap; margin-top: 0.3rem; }
.property-card .prop-tag { font-size: 0.55rem; padding: 0.1rem 0.3rem; border-radius: 3px; background: rgba(0,240,255,0.1); color: var(--neon-cyan); border: 1px solid rgba(0,240,255,0.2); }
.prop-location-header { font-family: var(--font-display); font-size: 0.9rem; color: var(--neon-pink); margin: 1rem 0 0.5rem; padding-bottom: 0.3rem; border-bottom: 1px solid var(--border-color); }
.property-card.locked { opacity: 0.4; }
.property-card .prop-details { display: flex; flex-wrap: wrap; gap: 0.3rem; margin: 0.3rem 0; }
.property-card .prop-type { font-size: 0.65rem; color: var(--text-dim); }
.prop-buy-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.5rem; margin-top: 0.5rem; }
.prop-buy-card { background: var(--bg-dark); border: 1px dashed var(--border-color); border-radius: 6px; padding: 0.6rem; text-align: center; cursor: pointer; transition: all 0.2s; }
.prop-buy-card:hover { border-color: var(--neon-green); border-style: solid; }

/* ========== CREW EXPANSION ========== */
.crew-rank-badge { font-size: 0.55rem; padding: 0.1rem 0.3rem; border-radius: 3px; font-family: var(--font-display); letter-spacing: 0.05em; }
.crew-rank-0 { background: rgba(136,136,170,0.2); color: var(--text-dim); }
.crew-rank-1 { background: rgba(57,255,20,0.15); color: var(--neon-green); border: 1px solid rgba(57,255,20,0.3); }
.crew-rank-2 { background: rgba(0,240,255,0.15); color: var(--neon-cyan); border: 1px solid rgba(0,240,255,0.3); }
.crew-rank-3 { background: rgba(191,95,255,0.15); color: var(--neon-purple); border: 1px solid rgba(191,95,255,0.3); }
.crew-rank-4 { background: rgba(255,230,0,0.15); color: var(--neon-yellow); border: 1px solid rgba(255,230,0,0.3); }
.crew-promote-btn { font-size: 0.6rem; padding: 0.2rem 0.4rem; background: rgba(191,95,255,0.2); color: var(--neon-purple); border: 1px solid var(--neon-purple); border-radius: 3px; cursor: pointer; }
.crew-promote-btn:hover { background: rgba(191,95,255,0.4); }
.crew-card.crew-warning { border-color: var(--neon-yellow); box-shadow: 0 0 10px rgba(255,230,0,0.15); }
.crew-detail-panel { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; padding: 1rem; }
.crew-detail-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 0.3rem; font-size: 0.7rem; }
.crew-trait { display: inline-block; font-size: 0.55rem; padding: 0.1rem 0.3rem; border-radius: 3px; margin: 0.1rem; background: rgba(255,107,53,0.15); color: var(--neon-orange); border: 1px solid rgba(255,107,53,0.25); }

/* ========== CAMPAIGN / ACT INDICATOR ========== */
.act-indicator { display: inline-flex; align-items: center; gap: 0.3rem; font-family: var(--font-display); font-size: 0.6rem; padding: 0.2rem 0.5rem; border-radius: 4px; background: rgba(255,45,149,0.1); border: 1px solid rgba(255,45,149,0.3); color: var(--neon-pink); }
.act-indicator .act-num { font-weight: 700; }
.act-indicator .act-name { color: var(--text-dim); font-size: 0.55rem; }
.act-milestone { font-size: 0.6rem; padding: 0.15rem 0.4rem; border-radius: 3px; margin: 0.1rem; }
.act-milestone.complete { background: rgba(57,255,20,0.15); color: var(--neon-green); }
.act-milestone.pending { background: rgba(136,136,170,0.1); color: var(--text-dim); }
.act-transition-banner { text-align: center; padding: 2rem 1rem; }
.act-transition-banner h2 { font-family: var(--font-display); font-size: 1.5rem; color: var(--neon-pink); text-shadow: 0 0 15px rgba(255,45,149,0.5); margin-bottom: 0.5rem; }
.act-transition-banner p { color: var(--text-dim); font-size: 0.8rem; }

/* ========== ENDING SCREEN ========== */
.ending-screen { text-align: center; padding: 2rem 1rem; max-width: 600px; margin: 0 auto; }
.ending-screen .ending-title { font-family: var(--font-display); font-size: 2rem; color: var(--neon-cyan); text-shadow: 0 0 20px rgba(0,240,255,0.4); margin-bottom: 0.5rem; }
.ending-screen .ending-subtitle { font-size: 0.8rem; color: var(--neon-pink); margin-bottom: 1rem; }
.ending-screen .ending-narrative { font-size: 0.75rem; color: var(--text-main); line-height: 1.6; margin-bottom: 1.5rem; text-align: left; padding: 1rem; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; }
.ending-screen .ending-grade { font-family: var(--font-display); font-size: 3rem; margin: 0.5rem 0; }
.ending-grade.grade-S { color: var(--neon-yellow); text-shadow: 0 0 20px rgba(255,230,0,0.5); }
.ending-grade.grade-A { color: var(--neon-green); }
.ending-grade.grade-B { color: var(--neon-cyan); }
.ending-grade.grade-C { color: var(--text-dim); }

/* ========== SUPPLY/DEMAND INDICATORS ========== */
.market-supply-indicator { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-left: 0.2rem; vertical-align: middle; }
.supply-high { background: var(--neon-red); box-shadow: 0 0 4px rgba(255,51,51,0.5); }
.supply-low { background: var(--neon-green); box-shadow: 0 0 4px rgba(57,255,20,0.5); }
.supply-normal { background: var(--text-dim); }
.demand-indicator { font-size: 0.55rem; color: var(--text-dim); }
.demand-high { color: var(--neon-green); }
.demand-low { color: var(--neon-red); }

/* --- BACK BUTTON TOP --- */
.back-btn-top {
  margin-bottom: 0.5rem;
  font-size: 0.75rem;
  padding: 0.3rem 0.8rem;
}

/* --- SIDEBAR DROPDOWN GROUPS --- */
.sidebar-group { margin-bottom: 0.2rem; }
.sidebar-group-header {
  cursor: pointer;
  padding: 0.35rem 0.5rem;
  color: var(--text-main);
  font-size: 0.75rem;
  font-weight: bold;
  letter-spacing: 0.5px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border: 1px solid var(--border-color);
  border-radius: 4px;
  background: rgba(255,255,255,0.03);
  transition: background 0.2s, border-color 0.2s;
  user-select: none;
}
.sidebar-group-header:hover {
  background: rgba(255,255,255,0.08);
  border-color: var(--neon-cyan);
}
.sidebar-group-content {
  display: none;
  padding-left: 0.3rem;
  border-left: 2px solid var(--border-color);
  margin-left: 0.3rem;
  margin-top: 0.15rem;
}
.sidebar-group-content.open { display: block; }
.group-badge {
  font-size: 0.65rem;
  background: rgba(255,68,68,0.2);
  padding: 0.1rem 0.3rem;
  border-radius: 3px;
  border: 1px solid rgba(255,68,68,0.4);
}

/* --- SECURITY ALERT POPUP --- */
.security-alert-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.3s;
}
.security-alert-card {
  background: var(--bg-panel);
  border: 3px solid #ff0000;
  border-radius: 12px;
  padding: 1.5rem 2rem;
  max-width: 450px;
  width: 90%;
  text-align: center;
  box-shadow: 0 0 40px rgba(255,0,0,0.5), 0 0 80px rgba(255,0,0,0.2), inset 0 0 20px rgba(255,0,0,0.1);
  animation: alertPulse 2s infinite;
}
.security-alert-header {
  font-size: 1.3rem;
  font-weight: bold;
  color: #ff4444;
  text-shadow: 0 0 10px rgba(255,0,0,0.8);
  margin-bottom: 1rem;
  letter-spacing: 2px;
}
.security-alert-item {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.5rem 0.7rem;
  margin-bottom: 0.5rem;
  background: rgba(255,0,0,0.1);
  border: 1px solid rgba(255,0,0,0.3);
  border-radius: 6px;
  text-align: left;
}
.security-alert-icon { font-size: 1.5rem; }
.security-alert-text { color: var(--text-main); font-size: 0.85rem; font-weight: 500; }
.security-alert-actions {
  display: flex;
  gap: 0.8rem;
  justify-content: center;
  margin-top: 1rem;
}
@keyframes alertPulse {
  0%, 100% { box-shadow: 0 0 40px rgba(255,0,0,0.5), 0 0 80px rgba(255,0,0,0.2); border-color: #ff0000; }
  50% { box-shadow: 0 0 60px rgba(255,0,0,0.8), 0 0 120px rgba(255,0,0,0.4); border-color: #ff4444; }
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* --- ENHANCED HEAT BAR --- */
.heat-bar-enhanced {
  width: 100px;
  height: 14px;
  position: relative;
}
.heat-pct {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 0.55rem;
  font-weight: bold;
  color: #fff;
  text-shadow: 0 0 3px #000, 0 0 5px #000;
  z-index: 1;
}
.heat-low { background: linear-gradient(90deg, #22cc44, #44dd66) !important; }
.heat-medium { background: linear-gradient(90deg, #ddaa00, #ff8800) !important; }
.heat-high { background: linear-gradient(90deg, #ff6600, #ff2200) !important; }
.heat-critical {
  background: linear-gradient(90deg, #ff0000, #ff4400) !important;
  animation: heatPulse 1s infinite;
}
@keyframes heatPulse {
  0%, 100% { box-shadow: 0 0 4px rgba(255,0,0,0.5); }
  50% { box-shadow: 0 0 12px rgba(255,0,0,0.9); }
}

/* --- NOTIFICATION TICKER --- */
.notification-ticker {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  padding: 0.4rem 0.6rem;
  background: rgba(255,170,0,0.08);
  border: 1px solid rgba(255,170,0,0.3);
  border-radius: 6px;
  margin-bottom: 0.5rem;
}
.alert-ticker-item {
  display: inline-flex;
  align-items: center;
  gap: 0.2rem;
  padding: 0.2rem 0.5rem;
  border-radius: 4px;
  font-size: 0.75rem;
  font-weight: 600;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.15);
  color: var(--text-main);
  transition: background 0.2s;
}
.alert-ticker-item:hover {
  background: rgba(255,255,255,0.12);
}
.alert-urgent {
  background: rgba(255,0,0,0.15);
  border-color: rgba(255,0,0,0.4);
  color: #ff6666;
  animation: pulse 2s infinite;
}

/* Tutorial System */
.tutorial-overlay {
  position: fixed;
  top: 8px; right: 8px;
  z-index: 9000;
  pointer-events: none;
  animation: fadeIn 0.3s ease;
}
.tutorial-card {
  background: var(--bg-panel, #111128);
  border: 2px solid var(--neon-cyan, #00f0ff);
  border-radius: 10px;
  padding: 0.7rem 0.9rem;
  max-width: 320px;
  width: auto;
  box-shadow: 0 4px 20px rgba(0, 240, 255, 0.3);
  text-align: center;
  pointer-events: auto;
  max-height: 40vh;
  overflow-y: auto;
  font-size: 0.8rem;
  pointer-events: auto;
  max-height: 250px;
  overflow-y: auto;
}
.tutorial-step-label {
  font-size: 0.65rem;
  color: #888;
  letter-spacing: 0.15em;
  margin-bottom: 0.5rem;
}
.tutorial-title {
  font-size: 1.3rem;
  font-weight: bold;
  color: var(--neon-cyan, #00f0ff);
  margin-bottom: 0.8rem;
  text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
}
.tutorial-text {
  font-size: 0.95rem;
  line-height: 1.5;
  color: #ddd;
  margin-bottom: 1rem;
}
.tutorial-text b {
  color: var(--neon-green, #39ff14);
}
.tutorial-progress {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-bottom: 1rem;
}
.tutorial-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #333;
  transition: background 0.3s;
}
.tutorial-dot.active {
  background: var(--neon-cyan, #00f0ff);
  box-shadow: 0 0 6px rgba(0, 240, 255, 0.6);
}
.tutorial-dot.done {
  background: var(--neon-green, #39ff14);
}
.tutorial-waiting {
  font-size: 0.85rem;
  color: #aaa;
  font-style: italic;
  padding: 0.5rem 0;
}
.tutorial-skip {
  display: block;
  margin: 0.8rem auto 0;
  background: none;
  border: none;
  color: #666;
  font-size: 0.75rem;
  cursor: pointer;
  text-decoration: underline;
  padding: 0.3rem;
}
.tutorial-skip:hover { color: #999; }

/* Non-blocking tutorial banner (for waitFor steps) */
.tutorial-banner {
  position: fixed;
  top: 0; left: 50%;
  transform: translateX(-50%);
  z-index: 10000;
  background: var(--bg-panel, #111128);
  border: 2px solid var(--neon-cyan, #00f0ff);
  border-top: none;
  border-radius: 0 0 12px 12px;
  padding: 0.6rem 1.2rem;
  max-width: 500px;
  width: 90%;
  display: flex;
  align-items: center;
  gap: 0.8rem;
  box-shadow: 0 4px 20px rgba(0, 240, 255, 0.3);
  animation: tutorialSlideDown 0.3s ease;
  pointer-events: auto;
}
.tutorial-banner-content { flex: 1; }
.tutorial-banner-step {
  font-size: 0.6rem;
  color: #666;
  letter-spacing: 0.1em;
}
.tutorial-banner-title {
  font-size: 0.9rem;
  font-weight: bold;
  color: var(--neon-cyan, #00f0ff);
  text-shadow: 0 0 8px rgba(0, 240, 255, 0.4);
}
.tutorial-banner-text {
  font-size: 0.8rem;
  color: #ccc;
  line-height: 1.3;
}
.tutorial-banner-text b {
  color: var(--neon-green, #39ff14);
}
@keyframes tutorialSlideDown {
  from { transform: translateX(-50%) translateY(-100%); }
  to { transform: translateX(-50%) translateY(0); }
}

/* First-open hint popup */
.tutorial-hint-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0, 0, 0, 0.6);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 15vh;
  z-index: 10000;
  animation: fadeIn 0.3s ease;
}
.tutorial-hint-card {
  background: var(--bg-panel, #111128);
  border: 2px solid var(--neon-pink, #ff2d95);
  border-radius: 10px;
  padding: 1.2rem 1.5rem;
  max-width: 380px;
  width: 85%;
  box-shadow: 0 0 30px rgba(255, 45, 149, 0.3);
  text-align: center;
}
.tutorial-hint-title {
  font-size: 1.1rem;
  font-weight: bold;
  color: var(--neon-pink, #ff2d95);
  margin-bottom: 0.5rem;
  text-shadow: 0 0 8px rgba(255, 45, 149, 0.5);
}
.tutorial-hint-text {
  font-size: 0.9rem;
  line-height: 1.4;
  color: #ccc;
}

/* ============================================================
   MOBILE RESPONSIVE - PORTRAIT-FIRST REDESIGN
   ============================================================ */

@supports (-webkit-touch-callout: none) {
  body { -webkit-text-size-adjust: 100%; }
}

@media (max-width: 768px) {
  html { font-size: 15px; }
  body { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
  #app { max-width: 100%; padding: 0.3rem; }
  .game-layout { flex-direction: column; gap: 0.3rem; }

  .game-sidebar {
    width: 100%; position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
    background: var(--bg-dark, #0a0a0a); border-top: 2px solid var(--neon-blue, #00d4ff);
    flex-direction: row; flex-wrap: nowrap; overflow-x: auto; overflow-y: hidden;
    padding: 0.25rem 0.3rem; gap: 0.2rem; max-height: 60px; -webkit-overflow-scrolling: touch;
  }
  .game-sidebar .sidebar-label { display: none; }
  .game-sidebar .sidebar-group-header { display: none; }
  .game-sidebar .sidebar-group-content { display: flex; flex-direction: row; gap: 0.2rem; }
  .sidebar-section { flex-direction: row; gap: 0.2rem; flex-shrink: 0; }
  .btn-sidebar { min-height: 44px; min-width: 44px; padding: 0.3rem 0.6rem; font-size: 0.75rem; white-space: nowrap; touch-action: manipulation; border-radius: 6px; }
  .game-main { padding-bottom: 70px; }

  .status-bar { padding: 0.3rem 0.4rem; margin-bottom: 0.3rem; font-size: 0.8rem; }
  .status-row { gap: 0.3rem; flex-wrap: wrap; }
  .stat { padding: 0.15rem 0.3rem; }
  .stat-label { font-size: 0.6rem; }
  .stat-value { font-size: 0.85rem; }
  .heat-bar { width: 50px; height: 6px; }

  .main-tab-bar { overflow-x: auto; -webkit-overflow-scrolling: touch; gap: 0.2rem; padding: 0.2rem 0; flex-wrap: nowrap; }
  .main-tab-btn { min-height: 44px; padding: 0.4rem 0.8rem; font-size: 0.85rem; white-space: nowrap; flex-shrink: 0; touch-action: manipulation; }
  .btn, button { min-height: 44px; touch-action: manipulation; }
  .btn-sm { min-height: 40px; padding: 0.3rem 0.6rem; font-size: 0.85rem; }

  .data-table, .drug-table { min-width: unset !important; width: 100%; font-size: 0.85rem; }
  .data-table th, .data-table td { padding: 0.35rem 0.3rem; }
  .market-section { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  input, select, textarea { font-size: 16px !important; }

  .trade-modal, .modal { width: 90vw; max-width: 500px; max-height: 85vh; overflow-y: auto; }
  .message-log { max-height: 80px; overflow-y: auto; font-size: 0.8rem; }
  .stats-overview { grid-template-columns: repeat(2, 1fr); gap: 0.4rem; }
  .stat-card { padding: 0.4rem; }
  .modal-overlay { align-items: flex-end; }
  .modal { border-radius: 12px 12px 0 0; max-width: 100%; width: 100%; margin: 0; }
  .location-header { padding: 0.4rem; margin-bottom: 0.3rem; }
  .location-header h2 { font-size: 1.1rem; margin: 0; }
  .inv-grid { grid-template-columns: repeat(2, 1fr); gap: 0.3rem; }
  .travel-grid, .transport-grid { grid-template-columns: 1fr; }
  .charselect-layout { grid-template-columns: 1fr !important; }
}

@media (max-width: 480px) {
  html { font-size: 16px; }
  #app { padding: 0.2rem; margin: 0; }
  .status-bar { padding: 0.2rem 0.3rem; margin-bottom: 0.2rem; }
  .status-row { gap: 0.2rem; }
  .stat { padding: 0.1rem 0.2rem; font-size: 0.75rem; }
  .stat-label { display: none; }
  .stat-value { font-size: 0.8rem; font-weight: bold; }
  .heat-bar { width: 40px; height: 5px; }
  .game-sidebar { max-height: 52px; padding: 0.15rem 0.2rem; }
  .btn-sidebar { min-height: 40px; padding: 0.2rem 0.5rem; font-size: 0.7rem; }
  .game-main { padding-bottom: 60px; }
  .main-tab-btn { min-height: 48px; padding: 0.5rem 0.7rem; font-size: 0.9rem; }
  .data-table, .drug-table { font-size: 0.8rem; }
  .data-table th, .data-table td { padding: 0.4rem 0.25rem; font-size: 0.8rem; }
  .data-table th:nth-child(n+5):not(:last-child),
  .data-table td:nth-child(n+5):not(:last-child) { display: none; }

  .trade-modal, .modal {
    position: fixed !important; top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important;
    width: 100% !important; max-width: 100% !important; height: 100vh !important; max-height: 100vh !important;
    border-radius: 0 !important; margin: 0 !important; z-index: 300; overflow-y: auto; padding: 1rem;
  }
  .trade-controls { flex-direction: column; gap: 0.4rem; }
  .trade-controls .btn, .trade-actions .btn { width: 100%; min-height: 52px; font-size: 1rem; font-weight: bold; }
  .trade-input { width: 100% !important; min-height: 48px; font-size: 1.2rem !important; text-align: center; }
  .modal-actions { flex-direction: column; gap: 0.4rem; }
  .modal-actions .btn { width: 100%; min-height: 48px; }
  .action-buttons { flex-direction: column; gap: 0.3rem; }
  .action-buttons .btn { width: 100%; min-height: 48px; font-size: 0.95rem; }
  .stats-overview { grid-template-columns: 1fr; }
  .message-log { max-height: 60px; font-size: 0.75rem; }
  .inv-grid { grid-template-columns: 1fr; }
  .skill-grid, .property-grid, .perk-grid { grid-template-columns: 1fr !important; }
  .notification-toast, .toast { width: 95vw !important; left: 2.5vw !important; font-size: 0.9rem; }
  .world-map-container svg { width: 100%; height: auto; }
  .price-chart { height: 120px; }
  .tutorial-card, .tutorial-overlay { width: 95vw; max-height: 80vh; overflow-y: auto; font-size: 0.95rem; }
}

@media (max-width: 360px) {
  html { font-size: 15px; }
  .status-bar { padding: 0.15rem 0.2rem; }
  .stat { font-size: 0.7rem; }
  .main-tab-btn { padding: 0.4rem 0.5rem; font-size: 0.8rem; }
  .data-table th, .data-table td { padding: 0.3rem 0.15rem; font-size: 0.75rem; }
  .game-sidebar { max-height: 48px; }
  .btn-sidebar { font-size: 0.65rem; min-height: 38px; padding: 0.15rem 0.35rem; }
  .game-main { padding-bottom: 55px; }
}

@media (max-height: 500px) and (orientation: landscape) {
  .status-bar { position: static; padding: 0.15rem 0.3rem; }
  .game-sidebar { position: static; max-height: none; flex-wrap: wrap; }
